<div class="lang">
  <button
    type="button"
    class="lang__trigger"
    [class.lang__trigger--active]="open()"
    aria-label="Change language"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    <span class="lang__code">{{ current().code.split('-')[0].toUpperCase() }}</span>
  </button>

  @if (open()) {
    <div class="lang__backdrop" (click)="close()"></div>
    <div class="lang__panel" role="menu">
      @for (lang of languages(); track lang.id) {
        <button
          type="button"
          class="lang__option"
          [class.lang__option--active]="lang.id === current().id"
          (click)="select(lang.id)"
        >
          <span class="lang__option-code">{{ lang.code }}</span>
          <span class="lang__option-name">{{ lang.name }}</span>
          @if (lang.id === current().id) {
            <ui-icon name="check" [size]="18" />
          }
        </button>
      }
    </div>
  }
</div>
