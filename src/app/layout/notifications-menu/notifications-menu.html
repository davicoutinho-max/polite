<div class="notif">
  <button
    type="button"
    class="notif__trigger"
    [class.notif__trigger--active]="open()"
    aria-label="Notifications"
    [attr.aria-expanded]="open()"
    (click)="toggle()"
  >
    <ui-icon name="notifications" [size]="22" [fill]="open()" />
    @if (unread() > 0) {
      <span class="notif__badge">{{ unread() > 9 ? '9+' : unread() }}</span>
    }
  </button>

  @if (open()) {
    <div class="notif__backdrop" (click)="close()"></div>
    <div class="notif__panel" role="menu">
      <header class="notif__head">
        <div class="notif__head-title">
          <h3>Notifications</h3>
          @if (unread() > 0) {
            <span class="notif__count">{{ unread() }} new</span>
          }
        </div>
        <button type="button" class="notif__link-btn" (click)="markAllRead()">Mark all read</button>
      </header>

      <div class="notif__list">
        @for (alert of alerts(); track alert.id) {
          <a
            class="notif__item"
            [class.notif__item--unread]="!alert.read"
            [routerLink]="alert.link ?? '/alerts'"
            (click)="onSelect(alert.id)"
          >
            <span class="notif__icon notif__icon--{{ tone(alert.category) }}">
              <ui-icon [name]="alert.icon" [size]="18" [fill]="true" />
            </span>
            <span class="notif__body">
              <span class="notif__title">{{ alert.title }}</span>
              <span class="notif__message">{{ alert.message }}</span>
              <span class="notif__time">{{ alert.timeLabel }}</span>
            </span>
            @if (!alert.read) {
              <span class="notif__dot" aria-hidden="true"></span>
            }
          </a>
        } @empty {
          <p class="notif__empty">You're all caught up.</p>
        }
      </div>

      <footer class="notif__foot">
        <a routerLink="/alerts" class="notif__link-btn" (click)="close()">See all notifications</a>
      </footer>
    </div>
  }
</div>
