name: civicpulse

# ---------------------------------------------------------------------------
# Local development infrastructure for all 14 CivicPulse microservices.
# One Postgres INSTANCE hosting 14 isolated DATABASES (each with its own
# role/credentials — see infra/postgres-init) is the pragmatic local-dev
# stand-in for "database per service"; in a real environment each of these
# would be its own managed instance. Nothing here is reachable except
# through the ports explicitly published below, matching the trust
# boundary documented in docs/architecture/system-architecture.html.
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: civicpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres_dev_only}
      IDENTITY_DB_PASSWORD: ${IDENTITY_DB_PASSWORD}
      DIRECTORY_DB_PASSWORD: ${DIRECTORY_DB_PASSWORD}
      PARTY_MANAGEMENT_DB_PASSWORD: ${PARTY_MANAGEMENT_DB_PASSWORD}
      PLATFORM_CONFIGURATION_DB_PASSWORD: ${PLATFORM_CONFIGURATION_DB_PASSWORD}
      MEMBERSHIP_AFFILIATION_DB_PASSWORD: ${MEMBERSHIP_AFFILIATION_DB_PASSWORD}
      PAYMENTS_DB_PASSWORD: ${PAYMENTS_DB_PASSWORD}
      FEED_CONTENT_DB_PASSWORD: ${FEED_CONTENT_DB_PASSWORD}
      LIVE_STREAMING_DB_PASSWORD: ${LIVE_STREAMING_DB_PASSWORD}
      FUNDRAISING_DB_PASSWORD: ${FUNDRAISING_DB_PASSWORD}
      ELECTIONS_DB_PASSWORD: ${ELECTIONS_DB_PASSWORD}
      PARTICIPATION_DB_PASSWORD: ${PARTICIPATION_DB_PASSWORD}
      MESSAGING_DB_PASSWORD: ${MESSAGING_DB_PASSWORD}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      PRIVACY_COMPLIANCE_DB_PASSWORD: ${PRIVACY_COMPLIANCE_DB_PASSWORD}
      LEGISLATIVE_DB_PASSWORD: ${LEGISLATIVE_DB_PASSWORD}
      ACTIVITY_FEED_DB_PASSWORD: ${ACTIVITY_FEED_DB_PASSWORD}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      ASSISTANT_DB_PASSWORD: ${ASSISTANT_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
      - ../docs/db:/schemas:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: civicpulse-pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-dev@civicpulse.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev_pw}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"

  redis:
    image: redis:7-alpine
    container_name: civicpulse-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_dev_pw}"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pw}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: civicpulse-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: "${KAFKA_CLUSTER_ID:-E6y2--96RkGyPNykKoUTJg}"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Single-broker cluster: the internal __consumer_offsets/__transaction_state topics
      # default to replication factor 3, which can never succeed with only 1 broker. Without
      # this fix, their auto-creation silently retries forever (visible as an endless "Sent
      # auto-creation request" log loop) and consumer-group coordination never works — every
      # @KafkaListener subscribes but never actually receives a message.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    ports:
      - "9094:9094"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 5s
      retries: 15

  kafka-init:
    image: apache/kafka:3.8.0
    container_name: civicpulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka-init/topics.txt:/topics.txt:ro
      - ./infra/kafka-init/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["bash", "/create-topics.sh"]
    environment:
      KAFKA_BROKER: "kafka:9092"
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: civicpulse-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: civicpulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: civicpulse-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-elastic_dev_pw}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-elastic_dev_pw} http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: civicpulse-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-civicpulse}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_dev_pw_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
  kafkadata:
  esdata:
  miniodata:
