spring:
  application:
    name: feed-content-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/feed_content_service
    username: ${DB_USERNAME:feed_content_service_app}
    password: ${DB_PASSWORD:feed_dev_pw}
    hikari:
      pool-name: feed-content-service-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "init schema (pre-applied by docker infra)"
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8087}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:civicpulse}
  secret-key: ${MINIO_ROOT_PASSWORD:minio_dev_pw_change_me}
  bucket: ${MINIO_POST_MEDIA_BUCKET:post-media}
  # Browser-facing origin for object URLs — same MinIO instance, but this is the host-reachable
  # address (the app itself may talk to MinIO over a different network path than the browser).
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    dev.civicpulse.feedcontent: INFO
    org.flywaydb: INFO
