spring:
  application:
    name: directory-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/directory_service
    username: ${DB_USERNAME:directory_service_app}
    password: ${DB_PASSWORD:directory_dev_pw}
    hikari:
      pool-name: directory-service-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "init schema (pre-applied by docker infra)"
    validate-on-migrate: true

  kafka:
    # localhost:9094 is Kafka's EXTERNAL listener (host access, see docker-compose.yml) — used
    # when this app runs directly on the host. Inside the civicpulse Docker network (once this
    # service itself is containerized) override to kafka:9092 via KAFKA_BOOTSTRAP_SERVERS.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

directory:
  identity-service:
    base-url: ${IDENTITY_SERVICE_BASE_URL:http://localhost:8081}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    dev.civicpulse.directory: INFO
    org.flywaydb: INFO
