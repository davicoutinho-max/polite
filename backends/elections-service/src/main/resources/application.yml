spring:
  application:
    name: elections-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/elections_service
    username: ${DB_USERNAME:elections_service_app}
    password: ${DB_PASSWORD:elections_dev_pw}
    hikari:
      pool-name: elections-service-pool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "init schema (pre-applied by docker infra)"
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8091}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

elections:
  directory-service:
    base-url: ${DIRECTORY_SERVICE_BASE_URL:http://localhost:8082}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    dev.civicpulse.elections: INFO
    org.flywaydb: INFO
